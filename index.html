<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="themeToggle" class="theme-toggle" aria-label="Alternar tema">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
    </button>

    <main>
        <!-- É importante usar as tags certas (a mais apropriada) para que o
         navegador interprete corretamente a estrutura da página -->
        <h1>Quem está assistindo?</h1>
        <section class="profiles">
            <a href="catalogo/catalogo.html" class="profile" data-name="Franklin" data-img="assets/img/perfil1.jpg">
                <img src="assets/img/perfil1.webp" alt="Perfil de Franklin">
                <h2>Franklin</h2>
            </a>
            <a href="catalogo/catalogo.html" class="profile" data-name="Thalia" data-img="assets/img/perfil2.jpg">
                <img src="assets/img/perfil2.webp" alt="Perfil de Thalia">
                <h2>Thalia</h2>
            </a>
            <a href="catalogo/catalogo.html" class="profile" data-name="Jimim" data-img="assets/img/perfil3.jpg">
                <img src="assets/img/perfil3.webp" alt="Perfil de Jimim">
                <h2>Jimim</h2>
            </a>
            <a href="catalogo/catalogo.html" class="profile" data-name="Chloe" data-img="assets/img/perfil4.jpg">
                <img src="assets/img/perfil4.webp" alt="Perfil de Chloe">
                <h2>Chloe</h2>
            </a>
        </section>
    </main>

    <script src="theme.js"></script>
    <script src="js/index.js"></script>
</body>
</html>
